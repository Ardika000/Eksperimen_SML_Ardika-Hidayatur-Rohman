name: Automate Data Preprocessing

on:
  push:
    branches: [ main ]
    paths:
      - 'data/Titanic-Dataset_raw.csv'
      - 'preprocessing/automate_Ardika-Hidayatur-Rohman.py'

jobs:
  preprocess:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn

      - name: Run automation script
        run: python preprocessing/automate_Ardika-Hidayatur-Rohman.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add preprocessing/
          git commit -m "Auto-update processed dataset via GitHub Actions" || echo "No changes to commit"
          git push
